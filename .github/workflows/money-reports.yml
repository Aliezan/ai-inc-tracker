name: Money Reports

on:
  schedule:
    # Daily report at 14:00 UTC (21:00 WIB)
    - cron: '0 14 * * *'
    # Weekly report every Sunday at 14:00 UTC (21:00 WIB)
    - cron: '0 14 * * 0'
    # Monthly report on the 1st at 14:00 UTC (21:00 WIB)
    - cron: '0 14 1 * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Report period'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly

env:
  NODE_VERSION: '22'

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Determine report period
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.period }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 1 * *" ]; then
            echo "value=monthly" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 0" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Categorize uncategorized transactions
        run: npm run categorize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          PUBSUB_TOPIC: ${{ secrets.PUBSUB_TOPIC }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send ${{ steps.period.outputs.value }} report
        run: node dist/scripts/send-money-report.js ${{ steps.period.outputs.value }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          PUBSUB_TOPIC: ${{ secrets.PUBSUB_TOPIC }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
